<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weight Loss Challenge 🏆</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e40;
      --text: #e2e2f0;
      --text-muted: #7b7b9a;
      --gold: #f59e0b;
      --silver: #94a3b8;
      --bronze: #b87333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e1b4b 0%, #0f0f13 60%);
      border-bottom: 1px solid var(--border);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: clamp(1.6rem, 4vw, 2.4rem); font-weight: 800; letter-spacing: -0.5px; }
    header h1 span { color: var(--gold); }
    header p { color: var(--text-muted); margin-top: .4rem; font-size: .95rem; }

    /* ── Countdown ── */
    #countdown {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1.4rem;
      flex-wrap: wrap;
    }
    .cd-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .6rem 1.1rem;
      min-width: 72px;
      text-align: center;
    }
    .cd-box .num { font-size: 1.8rem; font-weight: 700; color: var(--gold); line-height: 1; }
    .cd-box .lbl { font-size: .65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

    section { margin-bottom: 2.5rem; }
    section h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Podium ── */
    #podium {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .podium-card {
      flex: 1 1 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      position: relative;
      overflow: hidden;
      transition: transform .2s;
    }
    .podium-card:hover { transform: translateY(-3px); }
    .podium-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      opacity: .07;
    }
    .podium-card.rank-1::before { background: var(--gold); }
    .podium-card.rank-2::before { background: var(--silver); }
    .podium-card.rank-3::before { background: var(--bronze); }
    .podium-card .medal { font-size: 1.7rem; line-height: 1; }
    .podium-card .p-name {
      font-size: 1.35rem;
      font-weight: 800;
      margin: .3rem 0 .1rem;
    }
    .podium-card .p-delta {
      font-size: .9rem;
      font-weight: 600;
    }
    .podium-card .p-delta.good { color: #34d399; }
    .podium-card .p-delta.neutral { color: var(--text-muted); }
    .podium-card .p-sub { font-size: .78rem; color: var(--text-muted); margin-top: .15rem; }

    /* ── Participant cards ── */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    .p-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.4rem 1.2rem;
      border-top: 3px solid var(--accent);
    }
    .p-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .p-card-name { font-size: 1.4rem; font-weight: 800; }
    .p-card-badge {
      font-size: .72rem;
      font-weight: 700;
      padding: .3rem .7rem;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      opacity: .9;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: .55rem;
      font-size: .88rem;
    }
    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 600; }
    .stat-value.positive { color: #34d399; }
    .stat-value.negative { color: #f87171; }

    /* Progress bar */
    .prog-track {
      height: 10px;
      background: var(--surface2);
      border-radius: 999px;
      margin: .9rem 0 .35rem;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      transition: width .6s ease;
    }
    .prog-labels {
      display: flex;
      justify-content: space-between;
      font-size: .73rem;
      color: var(--text-muted);
    }
    .prog-pct { text-align: center; font-size: .8rem; font-weight: 700; color: var(--accent); margin-top: .3rem; }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
    }
    canvas { max-height: 340px; }

    /* ── History table ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th {
      background: var(--surface2);
      padding: .7rem 1rem;
      text-align: left;
      color: var(--text-muted);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }
    tbody tr { border-top: 1px solid var(--border); }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: .65rem 1rem; }
    .winner-row td:first-child { color: var(--gold); font-weight: 700; }
    .tag {
      display: inline-block;
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 4px;
      margin-left: .4rem;
    }
    .tag-best { background: #451a03; color: var(--gold); }
    .tag-gain { background: #450a0a; color: #f87171; }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: .8rem;
      padding: 2rem 1rem;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      #cards { grid-template-columns: 1fr; }
      .podium-card { flex: 1 1 140px; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚖️ Weight Loss <span>Challenge</span></h1>
  <p>Monthly weigh-ins · Deadline <strong>November 1, 2027</strong></p>
  <div id="countdown">
    <div class="cd-box"><div class="num" id="cd-months">–</div><div class="lbl">Months</div></div>
    <div class="cd-box"><div class="num" id="cd-days">–</div><div class="lbl">Days</div></div>
    <div class="cd-box"><div class="num" id="cd-hrs">–</div><div class="lbl">Hours</div></div>
    <div class="cd-box"><div class="num" id="cd-min">–</div><div class="lbl">Mins</div></div>
  </div>
</header>

<main>
  <!-- This Month's Leaderboard -->
  <section>
    <h2>🏆 This Month's Leaderboard</h2>
    <div id="podium"></div>
  </section>

  <!-- Participant Cards -->
  <section>
    <h2>📊 Progress Tracker</h2>
    <div id="cards"></div>
  </section>

  <!-- Chart -->
  <section>
    <h2>📈 Weight Over Time</h2>
    <div class="chart-wrap">
      <canvas id="weightChart"></canvas>
    </div>
  </section>

  <!-- History -->
  <section>
    <h2>📅 Weigh-In History</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th id="th-0"></th>
            <th id="th-1"></th>
            <th id="th-2"></th>
            <th>Monthly Winner</th>
          </tr>
        </thead>
        <tbody id="hist-body"></tbody>
      </table>
    </div>
  </section>
</main>

<footer>
  Data updates each month on the 1st. Last updated: <span id="last-updated">–</span>
</footer>

<script>
// ── Fetch & render ──────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('data.json?v=' + Date.now());
  return res.json();
}

function fmt(val, decimals = 1) {
  return val.toFixed(decimals);
}

function delta(current, prev) {
  const d = current - prev;
  return (d >= 0 ? '+' : '') + fmt(d) + ' kg';
}

function progressPct(start, goal, current) {
  const total = start - goal;
  if (total <= 0) return 100;
  const done = start - current;
  return Math.min(100, Math.max(0, (done / total) * 100));
}

// Countdown
function startCountdown(deadline) {
  function tick() {
    const now = new Date();
    const end = new Date(deadline);
    const diff = end - now;
    if (diff <= 0) {
      document.getElementById('cd-months').textContent = '0';
      document.getElementById('cd-days').textContent = '0';
      document.getElementById('cd-hrs').textContent = '0';
      document.getElementById('cd-min').textContent = '0';
      return;
    }
    const totalDays = Math.floor(diff / 864e5);
    const months = Math.floor(totalDays / 30.44);
    const remDays = Math.floor(totalDays % 30.44);
    const hrs = Math.floor((diff % 864e5) / 36e5);
    const mins = Math.floor((diff % 36e5) / 6e4);
    document.getElementById('cd-months').textContent = months;
    document.getElementById('cd-days').textContent = remDays;
    document.getElementById('cd-hrs').textContent = hrs;
    document.getElementById('cd-min').textContent = mins;
  }
  tick();
  setInterval(tick, 60000);
}

// Build all-dates list sorted
function allDates(participants) {
  const set = new Set();
  participants.forEach(p => p.entries.forEach(e => set.add(e.date)));
  return [...set].sort();
}

function weightOn(p, date) {
  const e = p.entries.find(x => x.date === date);
  return e ? e.weight : null;
}

function lastEntry(p) {
  if (!p.entries.length) return null;
  const sorted = [...p.entries].sort((a, b) => a.date.localeCompare(b.date));
  return sorted[sorted.length - 1];
}

function prevEntry(p) {
  const sorted = [...p.entries].sort((a, b) => a.date.localeCompare(b.date));
  return sorted.length >= 2 ? sorted[sorted.length - 2] : null;
}

// Monthly best: largest weight drop between last two shared weigh-in dates
function monthlyWinner(participants, dates) {
  if (dates.length < 2) return null;
  const lastDate = dates[dates.length - 1];
  const prevDate = dates[dates.length - 2];
  let best = null;
  let bestDrop = -Infinity;
  participants.forEach(p => {
    const cur = weightOn(p, lastDate);
    const prv = weightOn(p, prevDate);
    if (cur !== null && prv !== null) {
      const drop = prv - cur;
      if (drop > bestDrop) { bestDrop = drop; best = p; }
    }
  });
  return best;
}

// Render podium
function renderPodium(participants, dates) {
  const medals = ['🥇', '🥈', '🥉'];
  const colors = ['rank-1', 'rank-2', 'rank-3'];
  if (dates.length < 1) { document.getElementById('podium').innerHTML = '<p style="color:var(--text-muted)">No data yet.</p>'; return; }
  const lastDate = dates[dates.length - 1];
  const prevDate = dates.length >= 2 ? dates[dates.length - 2] : null;

  // Rank by: progress % descending
  const ranked = [...participants].sort((a, b) => {
    const pa = progressPct(a.startWeight, a.goalWeight, lastEntry(a)?.weight ?? a.startWeight);
    const pb = progressPct(b.startWeight, b.goalWeight, lastEntry(b)?.weight ?? b.startWeight);
    return pb - pa;
  });

  const html = ranked.map((p, i) => {
    const cur = lastEntry(p);
    const prv = prevDate ? weightOn(p, prevDate) : null;
    const drop = (cur && prv) ? (prv - cur.weight) : null;
    const pct = progressPct(p.startWeight, p.goalWeight, cur?.weight ?? p.startWeight);
    const dropStr = drop !== null
      ? (drop > 0 ? `<span class="p-delta good">▼ ${fmt(drop)} kg this month</span>`
         : drop < 0 ? `<span class="p-delta negative">▲ ${fmt(Math.abs(drop))} kg this month</span>`
         : `<span class="p-delta neutral">— No change</span>`)
      : `<span class="p-delta neutral">— First entry</span>`;
    return `
      <div class="podium-card ${colors[i]}" style="--accent:${p.color}">
        <div class="medal">${medals[i]}</div>
        <div class="p-name" style="color:${p.color}">${p.name}</div>
        ${dropStr}
        <div class="p-sub">${fmt(pct)}% to goal · ${cur ? cur.weight + ' kg' : '–'}</div>
      </div>`;
  }).join('');
  document.getElementById('podium').innerHTML = html;
}

// Render participant cards
function renderCards(participants, dates) {
  const html = participants.map(p => {
    const cur = lastEntry(p);
    const prv = prevEntry(p);
    const curW = cur ? cur.weight : p.startWeight;
    const pct = progressPct(p.startWeight, p.goalWeight, curW);
    const remaining = curW - p.goalWeight;
    const change = (cur && prv) ? (prv.weight - cur.weight) : 0;
    const changeStr = prv ? (change > 0 ? `▼ ${fmt(change)} kg` : change < 0 ? `▲ ${fmt(Math.abs(change))} kg` : '—') : '—';
    const changeClass = change > 0 ? 'positive' : change < 0 ? 'negative' : '';

    return `
      <div class="p-card" style="--accent:${p.color}">
        <div class="p-card-header">
          <div class="p-card-name" style="color:${p.color}">${p.name}</div>
          <div class="p-card-badge">${fmt(pct)}% done</div>
        </div>
        <div class="stat-row">
          <span class="stat-label">Current Weight</span>
          <span class="stat-value">${fmt(curW)} kg</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Goal</span>
          <span class="stat-value">${p.goalWeight} kg</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Still to lose</span>
          <span class="stat-value ${remaining > 0 ? '' : 'positive'}">${remaining > 0 ? fmt(remaining) + ' kg' : '🎉 Goal reached!'}</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">Change (last month)</span>
          <span class="stat-value ${changeClass}">${changeStr}</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" style="width:${pct}%; background:${p.color}"></div>
        </div>
        <div class="prog-labels">
          <span>${p.startWeight} kg</span>
          <span>🏁 ${p.goalWeight} kg</span>
        </div>
        <div class="prog-pct" style="color:${p.color}">${fmt(pct, 0)}% complete</div>
      </div>`;
  }).join('');
  document.getElementById('cards').innerHTML = html;
}

// Render chart
function renderChart(participants, dates) {
  const ctx = document.getElementById('weightChart').getContext('2d');
  const labels = dates.map(d => {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
  });

  const datasets = participants.map(p => ({
    label: p.name,
    data: dates.map(d => weightOn(p, d)),
    borderColor: p.color,
    backgroundColor: p.color + '22',
    borderWidth: 2.5,
    pointRadius: 5,
    pointHoverRadius: 7,
    tension: 0.3,
    fill: false,
    spanGaps: true,
  }));

  // Goal lines as dashed datasets
  participants.forEach(p => {
    datasets.push({
      label: p.name + ' goal',
      data: dates.map(() => p.goalWeight),
      borderColor: p.color,
      borderDash: [5, 5],
      borderWidth: 1.5,
      pointRadius: 0,
      fill: false,
      spanGaps: true,
    });
  });

  new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: {
            color: '#7b7b9a',
            filter: item => !item.text.includes('goal'),
            usePointStyle: true,
          }
        },
        tooltip: {
          backgroundColor: '#1a1a24',
          borderColor: '#2e2e40',
          borderWidth: 1,
          titleColor: '#e2e2f0',
          bodyColor: '#7b7b9a',
        }
      },
      scales: {
        x: {
          ticks: { color: '#7b7b9a' },
          grid: { color: '#1e1e2e' },
        },
        y: {
          ticks: { color: '#7b7b9a', callback: v => v + ' kg' },
          grid: { color: '#1e1e2e' },
          reverse: false,
        }
      }
    }
  });
}

// Render history table
function renderHistory(participants, dates) {
  participants.forEach((p, i) => {
    document.getElementById('th-' + i).textContent = p.name;
  });

  const winner = monthlyWinner(participants, dates);
  const prevDate = dates.length >= 2 ? dates[dates.length - 2] : null;

  const rows = [...dates].reverse().map(date => {
    const cells = participants.map(p => {
      const w = weightOn(p, date);
      const prv = prevDate && date === dates[dates.length - 1] ? weightOn(p, prevDate) : null;
      let tag = '';
      if (prv !== null && w !== null) {
        const drop = prv - w;
        if (drop < 0) tag = `<span class="tag tag-gain">+${fmt(Math.abs(drop))}</span>`;
      }
      return `<td>${w !== null ? fmt(w) + ' kg' + tag : '–'}</td>`;
    }).join('');

    const isLast = date === dates[dates.length - 1];
    const winnerName = (isLast && winner) ? winner.name : '';
    const winnerTag = winnerName ? `<span style="color:var(--gold)">🏆 ${winnerName}</span>` : '–';

    const dt = new Date(date + 'T00:00:00');
    const label = dt.toLocaleDateString('en-US', { month: 'long', year: 'numeric', day: 'numeric' });
    const cls = isLast ? 'winner-row' : '';
    return `<tr class="${cls}"><td>${label}</td>${cells}<td>${winnerTag}</td></tr>`;
  }).join('');

  document.getElementById('hist-body').innerHTML = rows || '<tr><td colspan="5" style="color:var(--text-muted);padding:1.5rem">No weigh-in data yet.</td></tr>';
}

// Last updated
function setLastUpdated(participants) {
  const dates = participants.flatMap(p => p.entries.map(e => e.date));
  if (!dates.length) return;
  const latest = dates.sort().at(-1);
  const dt = new Date(latest + 'T00:00:00');
  document.getElementById('last-updated').textContent = dt.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

// ── Main ────────────────────────────────────────────────────────────
(async () => {
  const data = await loadData();
  const { participants, deadline } = data;

  startCountdown(deadline);

  const dates = allDates(participants);

  renderPodium(participants, dates);
  renderCards(participants, dates);
  if (dates.length > 0) renderChart(participants, dates);
  renderHistory(participants, dates);
  setLastUpdated(participants);
})();
</script>
</body>
</html>
